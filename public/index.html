<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Asistente Hogar - Nelson</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <div class="app-title">
        <h1>Asistente Hogar</h1>
        <p>Expertos en reparaciones</p>
      </div>
      <button id="locBtn" class="chip">
        <span>📍</span> Nelson, SF
      </button>
    </header>

    <section id="chat" class="chat">
      </section>

    <footer class="composer">
      <div class="input-wrapper">
        <label class="icon-btn" title="Adjuntar imagen">
          <input id="attachInput" type="file" accept="image/*" hidden />
          <span>📷</span>
        </label>
        
        <textarea id="messageInput" rows="1" placeholder="Escribí tu consulta..."></textarea>
      </div>

      <button id="sendBtn" type="button" class="send-btn">
        Enviar
      </button>
    </footer>

    <p class="disclaimer">
      Área de cobertura: Nelson y alrededores. <br>
      Sugerencias orientativas, consulte a un profesional.
    </p>
  </main>

  <script src="script.js"></script>
</body>
</html>
